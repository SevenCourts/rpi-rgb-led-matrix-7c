name: Build App Tarball

on:
  workflow_dispatch:
  push:
    branches:
      - firmware/stable

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cython3 python3-pil
        pip install setuptools

    - name: Determine version
      run: |
        SHA="$(git rev-parse --short HEAD)"
        echo "SHA=$SHA" >> "$GITHUB_ENV"
        echo "APP_DIR=7c-app-$SHA" >> "$GITHUB_ENV"

    - name: Clone and build rpi-rgb-led-matrix
      run: |
        git clone --depth 1 --branch sevencourts/v2 \
          https://github.com/sevencourts/rpi-rgb-led-matrix.git /tmp/rpi-rgb-led-matrix
        cd /tmp/rpi-rgb-led-matrix
        make -C lib
        make -C bindings/python/rgbmatrix
        cd bindings/python
        # Imaging.h is from system python3-pil; C_INCLUDE_PATH ensures gcc finds it
        # Imaging.h from system python3-pil; find it dynamically
        IMAGING_DIR="$(find /usr/include -name 'Imaging.h' -printf '%h' -quit)"
        export C_INCLUDE_PATH="$IMAGING_DIR"
        python3 setup.py build_ext --inplace

    - name: Vendor Python dependencies
      run: |
        pip install --target=/tmp/vendor orjson

    - name: Download latest sevencourts-daemon
      run: |
        curl -fL -o /tmp/sevencourts-daemon.zip \
          "https://dl.sevencourts.com/s/gCYdoPfKEJCpawT/download"
        file /tmp/sevencourts-daemon.zip | grep -q "Zip archive" \
          || { echo "FATAL: downloaded file is not a valid zip archive"; exit 1; }
        unzip -o /tmp/sevencourts-daemon.zip -d /tmp/sevencourts-daemon-extracted
        chmod +x /tmp/sevencourts-daemon-extracted/sevencourts-daemon

    - name: Create commit info files
      run: |
        git rev-parse HEAD > commit-id
        git show -s --format=%as HEAD > commit-date

    - name: Stage tarball contents
      run: |
        STAGING="/tmp/staging/$APP_DIR"
        mkdir -p "$STAGING"

        # Launch script and Python entry point
        cp m1.sh samplebase.py "$STAGING/"

        # Commit info (read by gateway.py at runtime)
        cp commit-id commit-date "$STAGING/"

        # Python application package
        cp -r sevencourts "$STAGING/sevencourts"

        # Assets
        cp -r fonts "$STAGING/fonts"
        cp -r images "$STAGING/images"

        # rgbmatrix native library + Python bindings
        mkdir -p "$STAGING/rgbmatrix/lib"
        mkdir -p "$STAGING/rgbmatrix/python/rgbmatrix"
        cp /tmp/rpi-rgb-led-matrix/lib/librgbmatrix.a "$STAGING/rgbmatrix/lib/"
        # Find the compiled Python extension (.so) wherever setup.py placed it
        find /tmp/rpi-rgb-led-matrix/bindings/python -name '*.so' -exec cp {} "$STAGING/rgbmatrix/python/rgbmatrix/" \;
        cp /tmp/rpi-rgb-led-matrix/bindings/python/rgbmatrix/*.py "$STAGING/rgbmatrix/python/rgbmatrix/"
        # Verify the extension was found
        ls -la "$STAGING/rgbmatrix/python/rgbmatrix/"

        # sevencourts-daemon binary (aarch64)
        cp /tmp/sevencourts-daemon-extracted/sevencourts-daemon "$STAGING/sevencourts-daemon"

        # Vendored Python packages
        cp -r /tmp/vendor "$STAGING/vendor"

        # Version sentinel
        echo "$SHA" > "$STAGING/VERSION"

    - name: Create tarball and checksum
      run: |
        cd /tmp/staging
        tar czf "$GITHUB_WORKSPACE/7c-app-$SHA.tar.gz" "$APP_DIR"
        cd "$GITHUB_WORKSPACE"
        sha256sum "7c-app-$SHA.tar.gz" > "7c-app-$SHA.sha256"

    - name: Upload tarball artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-tarball
        path: |
          7c-app-*.tar.gz
          7c-app-*.sha256

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="app-$SHA"
        gh release create "$TAG" \
          "7c-app-$SHA.tar.gz" \
          "7c-app-$SHA.sha256" \
          --title "7c-app $SHA" \
          --notes "App tarball built from $(git rev-parse HEAD) ($(git show -s --format=%as HEAD))." \
          || gh release upload "$TAG" "7c-app-$SHA.tar.gz" "7c-app-$SHA.sha256" --clobber

    - name: Upload to dl.sevencourts.com
      env:
        BUILD_DATE: ${{ github.run_id }}
        BUILD_NUMBER: ${{ github.run_number }}
        GIT_REF: ${{ github.ref_name }}
        NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD_PASSWORD }}
        NEXTCLOUD_USERNAME: ${{ vars.NEXTCLOUD_USERNAME }}
      run: |
        export BUILD_DATE="$(date '+%y%m%d-%H%M%S')"
        ./build/publish "7c-app-$SHA.tar.gz"
        ./build/publish "7c-app-$SHA.sha256"
